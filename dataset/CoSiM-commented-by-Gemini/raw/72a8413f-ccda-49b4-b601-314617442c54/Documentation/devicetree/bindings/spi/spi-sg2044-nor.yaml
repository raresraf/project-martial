%YAML 1.2
---
$id: http://devicetree.org/schemas/spi/spi-sg2044-nor.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Device Tree Bindings for Sophgo SG2044 SPI NOR Flash Memory Controller (FMC)

maintainers:
  - Longbin Li <looong.bin@gmail.com>

description: |
  This binding describes the SPI NOR Flash Memory Controller (FMC) found on
  Sophgo's SG2042 and SG2044 SoCs. The controller is used to interface with
  external SPI NOR flash memory devices. This binding defines the necessary
  properties for the kernel to properly configure and use the controller.

allOf:
  - $ref: spi-controller.yaml#

properties:
  compatible:
    description:
      Must be one of the specified compatible strings, identifying the specific
      SoC model. The driver uses this to match the device with the appropriate
      driver implementation.
    enum:
      - sophgo,sg2042-spifmc-nor
      - sophgo,sg2044-spifmc-nor

  reg:
    description:
      Specifies the base physical address and size of the memory-mapped
      registers for the SPI NOR controller.
    maxItems: 1

  clocks:
    description:
      A phandle to the clock that provides the functional clock for the SPI
      controller. The driver will use this to enable and manage the clock
      rate.
    maxItems: 1

  interrupts:
    description:
      Specifies the interrupt generated by the controller to signal completion
      of an operation or an error condition.
    maxItems: 1

  resets:
    description:
      A phandle to the reset controller that can be used to reset the SPI
      controller hardware block.
    maxItems: 1

required:
  - compatible
  - reg
  - clocks
  - interrupts
  - resets

unevaluatedProperties: false

examples:
  - |
    // This example demonstrates a typical device tree node for the SG2044
    // SPI NOR Flash Memory Controller.
    #include <dt-bindings/interrupt-controller/irq.h>

    // The node is typically a child of the main system bus.
    spi@1000000 {
      // "compatible" string identifies the specific hardware.
      compatible = "sophgo,sg2044-spifmc-nor";

      // "reg" specifies the controller's register map address and size.
      reg = <0x1000000 0x4000000>;

      // Standard SPI bus properties.
      #address-cells = <1>;
      #size-cells = <0>;

      // "clocks" points to the clock source for this controller.
      clocks = <&clk 0>;

      // "interrupts" defines the interrupt line and its trigger type.
      interrupts = <37 IRQ_TYPE_LEVEL_HIGH>;

      // "resets" points to the reset line for this controller.
      resets = <&rst 0>;
    };
