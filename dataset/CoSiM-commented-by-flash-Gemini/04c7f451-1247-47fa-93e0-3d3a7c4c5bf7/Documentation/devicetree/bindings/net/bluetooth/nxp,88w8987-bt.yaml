#
# @brief Device Tree binding for NXP 88W8987/88W8997 Bluetooth chips.
# This YAML document describes the hardware characteristics and configuration
# required for integrating NXP's dual-radio (Wi-Fi and Bluetooth) chips,
# specifically the 88W8987 and 88W8997 models, into a Linux system via Device Tree.
# It details UART communication, firmware download procedures, and power save mechanisms.
#
# Domain: Device Tree, Bluetooth, NXP Hardware, Linux Kernel.
#
# SPDX-License-Identifier: (GPL-2.0 OR BSD-2-Clause)
%YAML 1.2
---
$id: http://devicetree.org/schemas/net/bluetooth/nxp,88w8987-bt.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: NXP Bluetooth chips

# Functional Utility: Provides a high-level overview of the binding's purpose.
# Describes how UART-attached NXP Bluetooth chips operate, including dual-radio
# capabilities, H4 protocol usage, firmware download via RTS/CTS, and the
# UART-TX break signal for power save mode.
description:
  This binding describes UART-attached NXP bluetooth chips. These chips
  are dual-radio chips supporting WiFi and Bluetooth. The bluetooth
  works on standard H4 protocol over 4-wire UART. The RTS and CTS lines
  are used during FW download. To enable power save mode, the host
  asserts break signal over UART-TX line to put the chip into power save
  state. De-asserting break wakes up the BT chip.

# Functional Utility: Lists the contact person(s) responsible for maintaining this binding.
maintainers:
  - Neeraj Sanjay Kale <neeraj.sanjaykale@nxp.com>

# Block Logic: Inherits definitions from a common Bluetooth controller schema.
# This ensures adherence to standard Bluetooth controller properties and conventions.
allOf:
  - $ref: bluetooth-controller.yaml#

# Block Logic: Defines the hardware-specific properties for the NXP Bluetooth chip.
# These properties are used by the kernel to configure and interact with the device.
properties:
  compatible:
    enum:
      - nxp,88w8987-bt
      - nxp,88w8997-bt

  fw-init-baudrate:
    $ref: /schemas/types.yaml#/definitions/uint32
    default: 115200
    description:
      Chip baudrate after FW is downloaded and initialized.
      This property depends on the module vendor's
      configuration.

  firmware-name:
    maxItems: 1

  device-wakeup-gpios:
    maxItems: 1
    description:
      Host-To-Chip power save mechanism is driven by this GPIO
      connected to BT_WAKE_IN pin of the NXP chipset.

  nxp,wakein-pin:
    $ref: /schemas/types.yaml#/definitions/uint8
    description:
      The GPIO number of the NXP chipset used for BT_WAKE_IN.

  interrupts:
    maxItems: 1
    description:
      Host wakeup by falling edge interrupt on this pin which is
      connected to BT_WAKE_OUT pin of the NXP chipset.

  interrupt-names:
    items:
      - const: wakeup

  wakeup-source: true

  nxp,wakeout-pin:
    $ref: /schemas/types.yaml#/definitions/uint8
    description:
      The GPIO number of the NXP chipset used for BT_WAKE_OUT.

# Block Logic: Specifies the mandatory properties that must be present in the device tree node.
# The 'compatible' property is critical for the kernel to identify and bind the correct driver.
required:
  - compatible

# Functional Utility: Disallows any properties not explicitly defined in this schema.
# This helps prevent accidental misconfigurations and ensures strict adherence to the binding.
unevaluatedProperties: false

# Block Logic: Provides an illustrative example of a device tree node for this NXP Bluetooth chip.
# This example demonstrates the correct syntax and usage of all relevant properties for hardware integration.
examples:
  - |
    #include <dt-bindings/gpio/gpio.h>
    #include <dt-bindings/interrupt-controller/irq.h>
    serial {
        bluetooth {
            compatible = "nxp,88w8987-bt";
            fw-init-baudrate = <3000000>;
            firmware-name = "uartuart8987_bt_v0.bin";
            device-wakeup-gpios = <&gpio 11 GPIO_ACTIVE_HIGH>;
            nxp,wakein-pin = /bits/ 8 <18>;
            nxp,wakeout-pin = /bits/ 8 <19>;
            local-bd-address = [66 55 44 33 22 11];
            interrupt-parent = <&gpio>;
            interrupts = <8 IRQ_TYPE_EDGE_FALLING>;
            interrupt-names = "wakeup";
            wakeup-source;
        };
    };
